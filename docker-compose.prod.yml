services:
  postgres:
    image: postgres:16-alpine
    container_name: sosyal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sosyal
      POSTGRES_USER: sosyal
      POSTGRES_PASSWORD: sosyal-change-me
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sosyal -d sosyal"]
      interval: 15s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sosyal-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - deploy/.env.prod.example
    environment:
      DATABASE_URL: postgresql+psycopg://sosyal:sosyal-change-me@postgres:5432/sosyal
    expose:
      - "8000"

  aider:
    image: paulgauthier/aider-full:latest
    container_name: sosyal-aider
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - aider-data:/home/aider/.aider
      - ./docker/aider/entrypoint.sh:/usr/local/bin/aider-entrypoint.sh:ro
      - ./docker/aider/worker.py:/usr/local/bin/aider-worker.py:ro
      - ./docker/aider/.aider.conf.yml:/home/aider/.aider.conf.yml:ro
      - ./docker/aider/.aider.model.settings.yml:/home/aider/.aider.model.settings.yml:ro
    env_file:
      - deploy/.env.prod.example
    environment:
      AIDER_TASK_MODE: worker
      AIDER_BACKEND_URL: http://backend:8000
      AIDER_MODEL: openai/gpt-4o-mini
      AIDER_EDITOR_MODEL: openai/gpt-4o-mini
      AIDER_ANALYTICS: false
      AIDER_AUTO_COMMITS: false
      AIDER_SHOW_MODEL_WARNINGS: false
    entrypoint: ["/bin/sh", "/usr/local/bin/aider-entrypoint.sh"]

  caddy:
    image: caddy:2.8-alpine
    container_name: sosyal-caddy
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  postgres-data:
  aider-data:
  caddy-data:
  caddy-config:
